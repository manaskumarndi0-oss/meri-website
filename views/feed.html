<!DOCTYPE html>
<html>
<head>
  <title>SnapVibe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fafafa; font-family: -apple-system, sans-serif; max-width: 470px; margin: 0 auto; }
    .navbar { background: white; border-bottom: 1px solid #ddd; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .navbar h1 { font-size: 24px; font-style: italic; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .navbar-icons { display: flex; gap: 16px; font-size: 22px; }
    .navbar-icons a { text-decoration: none; }
    .stories { display: flex; gap: 12px; padding: 12px 16px; overflow-x: auto; background: white; border-bottom: 1px solid #ddd; }
    .stories::-webkit-scrollbar { display: none; }
    .story { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; min-width: 60px; }
    .story-ring { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); padding: 2px; }
    .story-img { width: 100%; height: 100%; border-radius: 50%; background: #ddd; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; }
    .story-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .story span { font-size: 11px; color: #333; text-align: center; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .post { background: white; margin-bottom: 8px; border-bottom: 1px solid #efefef; }
    .post-header { display: flex; align-items: center; padding: 10px 12px; gap: 10px; cursor: pointer; }
    .post-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; flex-shrink: 0; }
    .post-username { font-weight: 600; font-size: 14px; }
    .post-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .post-actions { padding: 8px 12px; display: flex; gap: 16px; font-size: 24px; }
    .post-actions span { cursor: pointer; }
    .like-count { padding: 0 12px; font-weight: 600; font-size: 14px; }
    .post-caption { padding: 4px 12px 8px; font-size: 14px; }
    .post-caption b { font-weight: 600; }
    .comments-section { padding: 0 12px 8px; }
    .comment { font-size: 13px; margin-bottom: 2px; }
    .comment b { font-weight: 600; }
    .comment-input { display: flex; padding: 8px 12px; border-top: 1px solid #efefef; gap: 8px; }
    .comment-input input { flex: 1; border: none; outline: none; font-size: 14px; background: transparent; }
    .comment-input button { color: #0095f6; font-weight: 600; border: none; background: none; cursor: pointer; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; }
    .modal-box { background: white; width: 90%; max-width: 400px; margin: 80px auto; border-radius: 12px; overflow: hidden; }
    .modal-header { padding: 14px; text-align: center; font-weight: 600; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
    .modal-body { padding: 16px; }
    .modal-body input, .modal-body textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .modal-body textarea { height: 80px; resize: none; }
    .modal-body button { width: 100%; padding: 10px; background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 470px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; font-size: 26px; }
    .bottom-nav a { text-decoration: none; cursor: pointer; }
    .feed-container { padding-bottom: 60px; }
    .notif-badge { position: relative; }
    .badge { position: absolute; top: -4px; right: -4px; background: red; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<div class="navbar">
  <h1>SnapVibe</h1>
  <div class="navbar-icons">
    <a href="/notifications">🔔</a>
    <a href="/feed">💬</a>
  </div>
</div>

<div class="stories" id="storiesBar">
  <div class="story" onclick="window.location.href='/story'">
    <div class="story-ring"><div class="story-img">➕</div></div>
    <span>Teri Story</span>
  </div>
</div>

<div class="feed-container" id="feed"></div>

<div class="modal" id="uploadModal">
  <div class="modal-box">
    <div class="modal-header">
      <span onclick="closeModal()">✕</span>
      <span>Naya Post</span>
      <span></span>
    </div>
    <div class="modal-body">
      <input type="file" id="imageFile" accept="image/*">
      <textarea id="caption" placeholder="Caption likho..."></textarea>
      <button onclick="uploadPost()">Share Karo 🚀</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="/feed">🏠</a>
  <a href="/explore">🔍</a>
  <a onclick="openModal()">➕</a>
  <a href="/notifications">🔔</a>
  <a href="/profile">👤</a>
</div>

<script>
  const token = localStorage.getItem('token');
  const username = localStorage.getItem('username');
  const name = localStorage.getItem('name');
  if (!token) window.location.href = '/login';

  async function loadStories() {
    const res = await fetch('/api/stories');
    const stories = await res.json();
    const bar = document.getElementById('storiesBar');
    stories.forEach(s => {
      bar.innerHTML += `
        <div class="story" onclick="window.location.href='/story'">
          <div class="story-ring"><div class="story-img"><img src="${s.media}" onerror="this.parentElement.innerHTML='😊'"></div></div>
          <span>${s.username}</span>
        </div>`;
    });
  }

  async function loadPosts() {
    const res = await fetch('/api/posts');
    const posts = await res.json();
    const feed = document.getElementById('feed');
    if (posts.length === 0) {
      feed.innerHTML = '<p style="text-align:center;padding:40px;color:#999">Koi post nahi hai. Pehla post karo! 📸</p>';
      return;
    }
    feed.innerHTML = posts.map(post => {
      const liked = post.likes.includes(username);
      return `
        <div class="post">
          <div class="post-header" onclick="window.location.href='/profile?u=${post.username}'">
            <div class="post-avatar">${post.name ? post.name[0].toUpperCase() : '?'}</div>
            <div class="post-username">${post.username}</div>
          </div>
          <img class="post-img" src="${post.image}">
          <div class="post-actions">
            <span onclick="likePost('${post._id}')" id="like-btn-${post._id}">${liked ? '❤️' : '🤍'}</span>
            <span>💬</span>
            <span>📤</span>
          </div>
          <div class="like-count" id="likes-${post._id}">${post.likes.length} likes</div>
          <div class="post-caption"><b>${post.username}</b> ${post.caption}</div>
          <div class="comments-section" id="comments-${post._id}">
            ${post.comments.map(c => `<div class="comment"><b>${c.username}</b> ${c.comment}</div>`).join('')}
          </div>
          <div class="comment-input">
            <input type="text" placeholder="Comment karo..." id="cinput-${post._id}">
            <button onclick="addComment('${post._id}')">Post</button>
          </div>
        </div>`;
    }).join('');
  }

  async function likePost(id) {
    const res = await fetch('/api/like/' + id, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username })
    });
    const data = await res.json();
    document.getElementById('likes-' + id).innerText = data.likes + ' likes';
    const btn = document.getElementById('like-btn-' + id);
    btn.innerText = btn.innerText === '🤍' ? '❤️' : '🤍';
  }

  async function addComment(id) {
    const input = document.getElementById('cinput-' + id);
    const comment = input.value.trim();
    if (!comment) return;
    const res = await fetch('/api/comment/' + id, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, comment })
    });
    const data = await res.json();
    document.getElementById('comments-' + id).innerHTML = data.comments.map(c =>
      `<div class="comment"><b>${c.username}</b> ${c.comment}</div>`).join('');
    input.value = '';
  }

  function openModal() { document.getElementById('uploadModal').style.display = 'block'; }
  function closeModal() { document.getElementById('uploadModal').style.display = 'none'; }

  async function uploadPost() {
    const file = document.getElementById('imageFile').files[0];
    const caption = document.getElementById('caption').value;
    if (!file) return alert('Photo select karo!');
    const formData = new FormData();
    formData.append('image', file);
    formData.append('caption', caption);
    formData.append('username', username);
    formData.append('name', name);
    await fetch('/api/post', { method: 'POST', body: formData });
    closeModal();
    loadPosts();
  }

  loadStories();
  loadPosts();
</script>
</body>
</html>
