<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - SnapVibe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fafafa; font-family: -apple-system, sans-serif; padding-bottom: 60px; }
.header { background: white; border-bottom: 1px solid #ddd; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
.header span { font-size: 20px; cursor: pointer; }
.header h2 { font-size: 16px; font-weight: bold; }
.profile-section { background: white; padding: 16px; }
.profile-top { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; }
.profile-pic { width: 86px; height: 86px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
.profile-stats { display: flex; gap: 20px; flex: 1; justify-content: center; }
.stat { text-align: center; cursor: pointer; }
.stat-num { font-weight: bold; font-size: 18px; }
.stat-label { font-size: 12px; color: #666; }
.profile-name { font-weight: bold; font-size: 15px; margin-bottom: 2px; }
.profile-bio { font-size: 14px; color: #333; }
.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn { flex: 1; padding: 7px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; text-align: center; border: 1px solid #ddd; background: white; }
.btn-follow { background: #0095f6; color: white; border: none; }
.btn-following { background: white; color: black; border: 1px solid #ddd; }
.btn-msg { background: white; color: black; border: 1px solid #ddd; }
.divider { display: flex; border-bottom: 1px solid #ddd; margin-top: 8px; }
.tab { flex: 1; padding: 10px; text-align: center; font-size: 22px; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { border-bottom: 2px solid black; }
.posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
.post-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; }
.no-posts { text-align: center; padding: 40px; color: #999; }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; font-size: 26px; }
.bottom-nav a { text-decoration: none; }
</style>
</head>
<body>
<div class="header">
  <span onclick="history.back()">←</span>
  <h2 id="headerUsername">Profile</h2>
</div>

<div class="profile-section">
  <div class="profile-top">
    <img class="profile-pic" id="profilePic" src="/uploads/default.png" onerror="this.src='https://ui-avatars.com/api/?name=U&background=gradient'">
    <div class="profile-stats">
      <div class="stat"><div class="stat-num" id="postsCount">0</div><div class="stat-label">posts</div></div>
      <div class="stat"><div class="stat-num" id="followersCount">0</div><div class="stat-label">followers</div></div>
      <div class="stat"><div class="stat-num" id="followingCount">0</div><div class="stat-label">following</div></div>
    </div>
  </div>
  <div class="profile-name" id="profileName"></div>
  <div class="profile-bio" id="profileBio"></div>

  <div class="btn-row" id="btnRow"></div>
</div>

<div class="divider">
  <div class="tab active">⊞</div>
  <div class="tab">🔁</div>
  <div class="tab">👤</div>
</div>

<div class="posts-grid" id="postsGrid"></div>

<div class="bottom-nav">
  <a href="/feed">🏠</a>
  <a href="/explore">🔍</a>
  <a href="/notifications">🔔</a>
  <a href="/dm">💬</a>
  <a href="/profile">👤</a>
</div>

<script>
const token = localStorage.getItem('token');
const myUsername = localStorage.getItem('username');
const params = new URLSearchParams(window.location.search);
const viewUsername = params.get('u') || myUsername;
let isFollowing = false;

document.getElementById('headerUsername').textContent = viewUsername;

async function loadProfile() {
  const res = await fetch('/api/profile/' + viewUsername);
  const data = await res.json();
  if (!data.success) return alert('User nahi mila!');
  const { user, posts } = data;

  document.getElementById('profileName').textContent = user.name;
  document.getElementById('profileBio').textContent = user.bio || '';
  document.getElementById('postsCount').textContent = posts.length;
  document.getElementById('followersCount').textContent = user.followers.length;
  document.getElementById('followingCount').textContent = user.following.length;
  document.getElementById('headerUsername').textContent = user.username;
  if (user.profilePic) document.getElementById('profilePic').src = user.profilePic;

  isFollowing = user.followers.includes(myUsername);
  const btnRow = document.getElementById('btnRow');

  if (viewUsername === myUsername) {
    btnRow.innerHTML = `<button class="btn" onclick="window.location='/edit-profile'">Edit Profile</button>`;
  } else {
    btnRow.innerHTML = `
      <button class="btn ${isFollowing ? 'btn-following' : 'btn-follow'}" id="followBtn" onclick="toggleFollow()">
        ${isFollowing ? 'Following' : 'Follow'}
      </button>
      <button class="btn btn-msg" onclick="window.location='/dm?u=${user.username}'">Message</button>
    `;
  }

  const grid = document.getElementById('postsGrid');
  if (posts.length === 0) {
    grid.innerHTML = '<div class="no-posts" style="grid-column:span 3">Koi post nahi hai abhi 📸</div>';
  } else {
    grid.innerHTML = posts.map(p => `<img class="post-thumb" src="${p.image}">`).join('');
  }
}

async function toggleFollow() {
  const res = await fetch('/api/follow/' + viewUsername, {
    method: 'POST',
    headers: { 'Authorization': token, 'Content-Type': 'application/json' }
  });
  const data = await res.json();
  if (data.success) {
    isFollowing = data.action === 'followed';
    const btn = document.getElementById('followBtn');
    btn.textContent = isFollowing ? 'Following' : 'Follow';
    btn.className = `btn ${isFollowing ? 'btn-following' : 'btn-follow'}`;
    document.getElementById('followersCount').textContent = data.followers;
  }
}

loadProfile();
</script>
</body>
</html>
